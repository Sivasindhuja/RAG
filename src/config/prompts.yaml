query_expansion: |
  Rewrite the user question into a better search query for retrieving information from a technical document.

  The rewritten query should:
  - Preserve the original meaning
  - Include relevant technical terms if possible (e.g. GMPCS, INSAT, CAISS, WPC, DoT)
  - Resolve pronouns using conversation context when needed
  - Be concise and optimized for search

  Conversation context (may be empty):
  {memory_context}

  Return ONLY the improved query text.

  Question:
  {question}

rag_answer: |
  You must answer ONLY using the provided context.

  Rules:
  - Do not use outside knowledge.
  - If the context does not contain the answer, reply exactly:
  "The document does not contain this information."
  - Cite sources using the format [Source 1], [Source 2], etc.
  - Use conversation context only to interpret the question, not as factual source.

  Conversation context (may be empty):
  {memory_context}

  Context:
  {context}

  Question:
  {question}

memory_summary: |
  Summarize the following dialogue for a satellite communications policy assistant.
  Keep acronyms, entities, and the user's current topic. Max 4 sentences.

  Previous summary:
  {previous_summary}

  Recent dialogue:
  {dialogue}

  Return only the updated summary.